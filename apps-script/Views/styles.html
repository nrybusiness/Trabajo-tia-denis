<style>
  :root {
    --color-primary: #6366f1;
    --color-primary-dark: #4f46e5;
    --color-primary-light: #e0e7ff;
    --color-bg: #f8fafc;
    --color-surface: #ffffff;
    --color-border: #e2e8f0;
    --color-text: #0f172a;
    --color-text-muted: #64748b;
    --color-success: #10b981;
    --color-success-bg: #d1fae5;
    --color-error: #ef4444;
    --color-error-bg: #fee2e2;
    --color-warning: #f59e0b;
    --color-warning-bg: #fef3c7;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
    --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--color-bg); color: var(--color-text); font-size: 15px; line-height: 1.5; }
  .hidden { display: none !important; }
  .muted { color: var(--color-text-muted); }
  .small { font-size: 13px; }

  /* === LOADER === */
  .loader-screen, .unauth-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--color-border); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === UNAUTH === */
  .unauth-screen .card { background: var(--color-surface); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-lg); text-align: center; max-width: 400px; }
  .unauth-screen h1 { margin-bottom: 12px; }
  .unauth-screen p { margin: 8px 0; }

  /* === LAYOUT APP === */
  .app { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: 64px 1fr; grid-template-areas: "header header" "nav main"; min-height: 100vh; }
  .app-header { grid-area: header; background: var(--color-surface); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: var(--shadow-sm); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
  .brand-logo { font-size: 28px; color: var(--color-primary); }
  .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; }
  .user-rol { background: var(--color-primary-light); color: var(--color-primary-dark); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }

  .app-nav { grid-area: nav; background: var(--color-surface); border-right: 1px solid var(--color-border); padding: 16px 8px; overflow-y: auto; }
  .nav-section { margin-bottom: 24px; }
  .nav-section h3 { font-size: 11px; text-transform: uppercase; color: var(--color-text-muted); padding: 0 12px 8px; letter-spacing: 0.5px; }
  .nav-item { display: block; padding: 10px 12px; margin: 2px 0; border-radius: var(--radius-sm); cursor: pointer; color: var(--color-text); text-decoration: none; font-size: 14px; transition: background 0.15s; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
  .nav-item:hover { background: var(--color-bg); }
  .nav-item.active { background: var(--color-primary-light); color: var(--color-primary-dark); font-weight: 600; }
  .nav-item .ico { display: inline-block; width: 22px; }

  .app-main { grid-area: main; padding: 24px; overflow-y: auto; }
  .placeholder { color: var(--color-text-muted); padding: 40px; text-align: center; }

  /* === TARJETAS === */
  .card { background: var(--color-surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

  /* === KPI === */
  .kpi { background: var(--color-surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--color-border); }
  .kpi-label { font-size: 12px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 28px; font-weight: 700; margin-top: 8px; color: var(--color-text); }
  .kpi-sub { font-size: 13px; color: var(--color-text-muted); margin-top: 4px; }

  /* === TABLAS === */
  .table-wrap { background: var(--color-surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--color-border); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--color-border); font-size: 14px; }
  th { background: var(--color-bg); font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

  /* === BADGES === */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .badge-success { background: var(--color-success-bg); color: var(--color-success); }
  .badge-error { background: var(--color-error-bg); color: var(--color-error); }
  .badge-warning { background: var(--color-warning-bg); color: var(--color-warning); }
  .badge-default { background: var(--color-bg); color: var(--color-text-muted); }

  /* === BOTONES === */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text); font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: var(--color-bg); }
  .btn-primary { background: var(--color-primary); border-color: var(--color-primary); color: white; }
  .btn-primary:hover { background: var(--color-primary-dark); }
  .btn-danger { background: var(--color-error); border-color: var(--color-error); color: white; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* === FORM === */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--color-text); }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; background: var(--color-surface); }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-light); }
  .form-row { display: flex; gap: 12px; }
  .form-row > * { flex: 1; }

  /* === MODAL === */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
  .modal { background: var(--color-surface); border-radius: var(--radius); padding: 24px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h2 { font-size: 18px; }
  .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--color-text-muted); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* === TOAST === */
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); font-size: 14px; font-weight: 500; z-index: 2000; max-width: 400px; }
  .toast-success { background: var(--color-success); color: white; }
  .toast-error { background: var(--color-error); color: white; }
  .toast-info { background: var(--color-text); color: white; }

  /* === FILTROS / TOOLBAR === */
  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .toolbar input, .toolbar select { padding: 8px 12px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; }
  .toolbar input[type="search"] { min-width: 240px; }

  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .page-header h1 { font-size: 24px; font-weight: 700; }
  .page-header .subtitle { color: var(--color-text-muted); font-size: 14px; }

  /* === RESPONSIVE === */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-areas: "header" "nav" "main"; grid-template-rows: 64px auto 1fr; }
    .app-nav { display: flex; overflow-x: auto; padding: 8px; border-right: none; border-bottom: 1px solid var(--color-border); }
    .nav-section { display: flex; gap: 4px; margin-bottom: 0; }
    .nav-section h3 { display: none; }
    .nav-item { white-space: nowrap; }
    .app-main { padding: 16px; }
    .form-row { flex-direction: column; }
  }
</style>
