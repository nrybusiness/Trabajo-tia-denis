<script>
Views.vendedoras = {
  async render() {
    App.renderMain('<div class="placeholder">Cargando vendedoras…</div>');
    const res = await api('apiListarVendedoras');
    if (!res.ok) {
      App.renderMain('<div class="card"><p class="muted">Error: ' + App.escapeHtml(res.error) + '</p></div>');
      return;
    }
    const lista = res.data;
    const isSuper = App.user.rol === 'superadmin';

    let html = '<div class="page-header"><div><h1>👥 Vendedoras</h1><p class="subtitle">' + lista.length + ' registradas</p></div>';
    if (isSuper) html += '<button class="btn btn-primary" id="btn-nueva">+ Nueva vendedora</button>';
    html += '</div>';

    html += '<div class="table-wrap"><table><thead><tr>';
    html += '<th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th>';
    if (isSuper) html += '<th>Acciones</th>';
    html += '</tr></thead><tbody>';
    lista.forEach(v => {
      html += '<tr>';
      html += '<td><code>' + App.escapeHtml(v.vendedora_id) + '</code></td>';
      html += '<td>' + App.escapeHtml(v.nombre) + '</td>';
      html += '<td class="muted small">' + App.escapeHtml(v.email) + '</td>';
      html += '<td><span class="badge badge-default">' + App.escapeHtml(v.rol) + '</span></td>';
      html += '<td>' + (v.activo ? '<span class="badge badge-success">Activa</span>' : '<span class="badge badge-error">Inactiva</span>') + '</td>';
      if (isSuper) {
        html += '<td><button class="btn btn-sm" data-id="' + v.vendedora_id + '">Editar</button></td>';
      }
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    App.renderMain(html);

    if (isSuper) {
      document.getElementById('btn-nueva').addEventListener('click', () => this.modalNueva());
      document.querySelectorAll('button[data-id]').forEach(btn => {
        btn.addEventListener('click', () => this.modalEditar(lista.find(x => x.vendedora_id === btn.dataset.id)));
      });
    }
  },

  modalNueva() {
    const html =
      '<form>' +
        '<div class="form-group"><label>Nombre</label><input name="nombre" required></div>' +
        '<div class="form-group"><label>Email Google</label><input type="email" name="email" required></div>' +
        '<div class="form-group"><label>Rol</label><select name="rol"><option value="vendedora">Vendedora</option><option value="admin">Admin</option><option value="superadmin">Superadmin</option></select></div>' +
        '<div class="modal-actions"><button type="submit" class="btn btn-primary">Crear</button></div>' +
      '</form>';
    App.modal('Nueva vendedora', html, async (data, cerrar) => {
      const res = await api('apiCrearVendedora', data);
      if (res.ok) {
        App.toast('✓ Creada: ' + res.data.vendedora_id, 'success');
        cerrar();
        this.render();
      } else {
        App.toast('Error: ' + res.error, 'error');
      }
    });
  },

  modalEditar(v) {
    if (!v) return;
    const html =
      '<form>' +
        '<input type="hidden" name="vendedora_id" value="' + v.vendedora_id + '">' +
        '<div class="form-group"><label>Nombre</label><input name="nombre" value="' + App.escapeHtml(v.nombre) + '" required></div>' +
        '<div class="form-group"><label>Email</label><input type="email" name="email" value="' + App.escapeHtml(v.email) + '" required></div>' +
        '<div class="form-group"><label>Rol</label><select name="rol">' +
          '<option value="vendedora"' + (v.rol === 'vendedora' ? ' selected' : '') + '>Vendedora</option>' +
          '<option value="admin"' + (v.rol === 'admin' ? ' selected' : '') + '>Admin</option>' +
          '<option value="superadmin"' + (v.rol === 'superadmin' ? ' selected' : '') + '>Superadmin</option>' +
        '</select></div>' +
        '<div class="form-group"><label>Activa</label><select name="activo"><option value="true"' + (v.activo ? ' selected' : '') + '>Sí</option><option value="false"' + (!v.activo ? ' selected' : '') + '>No</option></select></div>' +
        '<div class="modal-actions"><button type="submit" class="btn btn-primary">Guardar</button></div>' +
      '</form>';
    App.modal('Editar vendedora', html, async (data, cerrar) => {
      data.activo = data.activo === 'true';
      const res = await api('apiEditarVendedora', data);
      if (res.ok) {
        App.toast('✓ Actualizada', 'success');
        cerrar();
        this.render();
      } else {
        App.toast('Error: ' + res.error, 'error');
      }
    });
  }
};
</script>
