<script>
Views.entregas = {
  async render() {
    App.renderMain('<div class="placeholder">Cargando…</div>');
    const [resKardex, resVendedoras] = await Promise.all([
      api('apiObtenerKardex', { vendedora_id: App.user.vendedora_id }),
      api('apiListarVendedoras')
    ]);
    if (!resKardex.ok) {
      App.renderMain('<div class="card"><p class="muted">Error: ' + App.escapeHtml(resKardex.error) + '</p></div>');
      return;
    }
    const items = resKardex.data.items;
    // Para vendedora normal, el destino siempre es la dueña (admin). Para admin, puede elegir.
    const vendedoras = (resVendedoras.ok ? resVendedoras.data : []).filter(v => v.activo);
    const admins = vendedoras.filter(v => v.rol === 'admin');

    let html = '<div class="page-header"><div><h1>📤 Registrar Entrega</h1><p class="subtitle">Devuelve prendas a la dueña. El stock se transfiere de tu kardex al de ella.</p></div></div>';

    if (items.length === 0) {
      html += '<div class="card"><p class="muted">No tienes prendas para devolver.</p></div>';
      App.renderMain(html);
      return;
    }

    html += '<div class="card" style="max-width: 600px;">';
    html += '<form id="entrega-form">';
    html += '<div class="form-group"><label>Prenda</label>';
    html += '<select name="sku" required><option value="">— Selecciona —</option>';
    items.forEach(it => {
      html += '<option value="' + App.escapeHtml(it.sku) + '">' +
              App.escapeHtml(it.nombre) + ' · ' + App.escapeHtml(it.talla) +
              ' (' + it.cantidad + ')</option>';
    });
    html += '</select></div>';
    html += '<div class="form-group"><label>Cantidad</label><input type="number" name="cantidad" min="1" value="1" required></div>';
    html += '<div class="form-group"><label>Devolver a</label><select name="destino_id" required>';
    if (admins.length === 0) {
      html += '<option value="">No hay admins disponibles</option>';
    } else {
      admins.forEach(a => {
        html += '<option value="' + a.vendedora_id + '">' + App.escapeHtml(a.nombre) + '</option>';
      });
    }
    html += '</select></div>';
    html += '<div class="form-group"><label>Notas (opcional)</label><input type="text" name="notas" placeholder="Motivo de la devolución"></div>';
    html += '<button type="submit" class="btn btn-primary">📤 Registrar entrega</button>';
    html += '</form></div>';

    App.renderMain(html);

    document.getElementById('entrega-form').addEventListener('submit', async e => {
      e.preventDefault();
      const data = {};
      new FormData(e.target).forEach((v, k) => { data[k] = v; });
      data.cantidad = parseInt(data.cantidad, 10);
      data.vendedora_id = App.user.vendedora_id;

      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Guardando…';

      const res = await api('apiRegistrarEntrega', data);
      if (res.ok) {
        App.toast('✓ Entrega registrada: ' + res.data.mov_id, 'success');
        Views.entregas.render();
      } else {
        App.toast('Error: ' + res.error, 'error');
        btn.disabled = false;
        btn.textContent = '📤 Registrar entrega';
      }
    });
  }
};
</script>
